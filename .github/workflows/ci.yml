name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Grant all jobs the minimum permissions needed to checkout private repo
permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect which files changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      ui-changed: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            ui:
              # Only components, layouts, pages, and styles (visible changes)
              - 'apps/web/src/components/**'
              - 'apps/web/src/features/**'
              - 'apps/web/src/layouts/**'
              - 'apps/web/src/pages/**'
              - 'apps/web/src/**/*.tsx'
              - 'apps/web/src/**/*.css'
              - 'apps/web/e2e/**'
              - '.github/workflows/ci.yml'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - name: Run linter
        run: pnpm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - name: Build
        run: pnpm run build

  accessibility:
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run if UI files changed (on PR or push)
    if: ${{ needs.detect-changes.outputs.ui-changed == 'true' }}
    # Blocker on main and develop when UI paths change
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install
      - name: Build web app
        run: cp apps/web/.env.e2e apps/web/.env.local && pnpm --filter web build
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run accessibility tests
        run: pnpm --filter web exec playwright test e2e/accessibility.spec.ts
