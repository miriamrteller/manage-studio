
[functions.send-otp-email]
enabled = true
verify_jwt = true
import_map = "./functions/send-otp-email/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/send-otp-email/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/send-otp-email/*.html" ]

[functions.send-otp-sms]
enabled = true
verify_jwt = true
import_map = "./functions/send-otp-sms/deno.json"
entrypoint = "./functions/send-otp-sms/index.ts"

[functions.send-notification]
enabled = true
# JWT verified in-function so browser preflight gets full CORS headers (apikey, x-client-info).
verify_jwt = false
